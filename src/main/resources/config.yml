prefix: "[SimpleFallbacks]"

settings:
  limbo:
    enabled: true
    gamemode: ADVENTURE
    name: "Fallback"
    world: THE_END # OVERWORLD, THE_NETHER, THE_END,
    x: 0
    y: 500
    z: 0
    yaw: 0
    pitch: 0
    max-attempts: 0 # 0 = infinity
    reconnect-delay: 10000 # IN MILLISECONDS

  # Сервера на которые будет отправлять при выключении сервера
  fallback-servers:
      - "lobby"